<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지구 공전과 계절 변화 3D - 통합사회 C</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: rgba(0,0,0,0.06);
            --radius: 20px;
        }

        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        a { text-decoration: none; color: inherit; }

        /* 글래스모피즘 네비게이션 (공통) */
        .navbar { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px 40px; position: sticky; top: 0; z-index: 9999; border-bottom: 1px solid var(--border-color); flex-shrink: 0;
        }
        .logo { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
        .logo-icon { background: var(--primary); color: white; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .logo-icon i { width: 18px; height: 18px; stroke-width: 2.5px; }
        .menu { display: flex; gap: 24px; }
        .menu a { font-size: 0.95rem; font-weight: 600; color: var(--text-sub); padding: 8px 12px; border-radius: 12px; transition: all 0.2s ease; }
        .menu a:hover { background: var(--primary-light); color: var(--primary); }

        /* 대시보드 레이아웃 */
        .dashboard-container { display: flex; flex: 1; padding: 24px; gap: 24px; max-width: 1600px; margin: 0 auto; width: 100%; box-sizing: border-box; overflow: hidden; }
        
        /* 왼쪽 3D 캔버스 영역 */
        .canvas-wrapper { flex: 2; background: #020617; border-radius: var(--radius); position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border-color); display: flex; flex-direction: column; }
        #simulation-container { flex: 1; width: 100%; height: 100%; }
        
        .guide-badge { position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.9); font-size: 0.85rem; padding: 8px 14px; border-radius: 12px; pointer-events: none; z-index: 10; display: flex; align-items: center; gap: 6px; font-weight: 500; }

        /* 오른쪽 컨트롤 패널 영역 */
        .controls-wrapper { flex: 1; min-width: 340px; max-width: 450px; background: var(--card-bg); border-radius: var(--radius); padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 25px; overflow-y: auto; }
        
        .panel-header { margin-bottom: 5px; }
        .panel-header h2 { margin: 0 0 8px 0; font-size: 1.4rem; font-weight: 800; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
        .panel-header p { margin: 0; font-size: 0.95rem; color: var(--text-sub); line-height: 1.5; word-break: keep-all; }

        /* 세그먼트 컨트롤 (라디오 버튼 대체) */
        .segment-control { display: flex; background: #f1f5f9; padding: 4px; border-radius: 12px; position: relative; }
        .segment-control label { flex: 1; text-align: center; font-size: 0.95rem; font-weight: 700; color: var(--text-sub); padding: 10px 0; cursor: pointer; position: relative; z-index: 2; transition: color 0.3s; }
        .segment-control input[type="radio"] { display: none; }
        .segment-control input[type="radio"]:checked + label { color: var(--primary); }
        .segment-highlight { position: absolute; top: 4px; bottom: 4px; left: 4px; width: calc(50% - 4px); background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }
        #tilt0:checked ~ .segment-highlight { transform: translateX(100%); }

        /* 슬라이더 및 재생 컨트롤 */
        .timeline-box { background: var(--primary-light); border: 1px solid #bfdbfe; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .month-display { font-size: 2rem; font-weight: 800; color: var(--primary); text-align: center; letter-spacing: -1px; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #cbd5e1; border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--primary); cursor: pointer; box-shadow: 0 0 0 4px white, 0 2px 5px rgba(0,0,0,0.2); transition: transform 0.1s; }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); }
        
        .play-btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 1rem; transition: 0.2s; font-family: inherit; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .play-btn:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(37, 99, 235, 0.3); }
        .play-btn.playing { background: #ef4444; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }
        .play-btn.playing:hover { background: #dc2626; }

        /* 설명 패널 */
        .info-panel { background: #f8fafc; border: 1px solid var(--border-color); padding: 20px; border-radius: 16px; font-size: 0.95rem; color: #334155; line-height: 1.6; display: flex; flex-direction: column; gap: 10px; flex: 1; }
        .info-panel strong { color: var(--text-main); font-size: 1.05rem; }

        @media (max-width: 900px) {
            .dashboard-container { flex-direction: column; overflow-y: auto; }
            .canvas-wrapper { min-height: 50vh; flex: none; }
            .controls-wrapper { max-width: 100%; flex: none; }
            .navbar { padding: 16px 20px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-icon"><i data-lucide="globe"></i></div>
            Society - C - Geography
        </a>
        <div class="menu">
            <a href="index.html">홈</a>
            <a href="qna.html">Q&A 게시판</a>
        </div>
    </nav>

    <div class="dashboard-container">
        
        <div class="canvas-wrapper">
            <div class="guide-badge"><i data-lucide="mouse-pointer-click" style="width:14px;height:14px;"></i> 화면 드래그로 시점 회전 가능</div>
            <div id="simulation-container"></div>
        </div>

        <div class="controls-wrapper">
            <div class="panel-header">
                <h2><i data-lucide="sun-dim" style="color:var(--primary);"></i> 계절 변화 원리</h2>
                <p>지구 자전축의 기울기와 공전 궤도에 따른 태양 일사량의 변화를 관찰해 보세요.</p>
            </div>

            <div class="segment-control">
                <input type="radio" name="tilt" id="tilt23" value="23.5" checked>
                <label for="tilt23">실제 (23.5°)</label>
                <input type="radio" name="tilt" id="tilt0" value="0">
                <label for="tilt0">가상 (0°)</label>
                <div class="segment-highlight"></div>
            </div>

            <div class="timeline-box">
                <div class="month-display" id="monthLabel">6월</div>
                <input type="range" id="monthSlider" min="1" max="12.99" step="0.05" value="6">
                <button class="play-btn" id="playBtn">
                    <i data-lucide="play" id="playIcon"></i> <span id="playText">자동 재생</span>
                </button>
            </div>

            <div class="info-panel">
                <div style="display:flex; align-items:center; gap:6px; color:var(--primary); font-weight:800; margin-bottom:4px;">
                    <i data-lucide="info" style="width:16px;height:16px;"></i> 분석 리포트
                </div>
                <div id="infoText">데이터 로딩 중...</div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons(); // 아이콘 렌더링

        // --- Three.js 초기화 ---
        const container = document.getElementById('simulation-container');
        const scene = new THREE.Scene();
        
        // 카메라 설정 (대시보드 레이아웃에 맞춰 시야각 조정)
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 2000);
        camera.position.set(0, 150, 400); 
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); // alpha: true 로 배경 투명도 지원
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // 레티나 디스플레이 선명도 향상
        container.appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.minDistance = 100; controls.maxDistance = 800; // 줌 제한

        // --- 조명 설정 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.15); scene.add(ambientLight);
        const sunLight = new THREE.PointLight(0xffffff, 2, 2000); sunLight.position.set(0, 0, 0); scene.add(sunLight);

        // --- 배경 우주(별) 추가 ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 1.5, opacity: 0.8, transparent: true});
        const starVertices = [];
        for(let i=0; i<1500; i++) {
            const x = THREE.MathUtils.randFloatSpread(1500);
            const y = THREE.MathUtils.randFloatSpread(1500);
            const z = THREE.MathUtils.randFloatSpread(1500);
            // 너무 가까운 별은 안 보이게 밀어내기
            if(Math.abs(x) > 200 || Math.abs(y) > 200 || Math.abs(z) > 200) {
                starVertices.push(x, y, z);
            }
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        // --- 오브젝트 생성 ---
        // 1. 태양 (발광 효과)
        const sunGeometry = new THREE.SphereGeometry(30, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xfcd34d }); 
        const sun = new THREE.Mesh(sunGeometry, sunMaterial); scene.add(sun);

        // 2. 공전 궤도선
        const R = 200;
        const orbitGeometry = new THREE.RingGeometry(R - 0.5, R + 0.5, 128);
        const orbitMaterial = new THREE.MeshBasicMaterial({ color: 0x334155, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
        const orbitPath = new THREE.Mesh(orbitGeometry, orbitMaterial); orbitPath.rotation.x = Math.PI / 2; scene.add(orbitPath);

        // 3. 지구 모델 그룹화
        const earthGroup = new THREE.Group(); scene.add(earthGroup);
        const earthRadius = 16;
        const earthGeometry = new THREE.SphereGeometry(earthRadius, 32, 32);
        const earthMaterial = new THREE.MeshPhongMaterial({ color: 0x3b82f6, shininess: 15 }); // 조금 더 선명한 파란색
        const earth = new THREE.Mesh(earthGeometry, earthMaterial); earthGroup.add(earth); 

        // 4. 적도선 (빨간 링)
        const equatorGeometry = new THREE.TorusGeometry(earthRadius + 1.5, 0.6, 16, 64);
        const equatorMaterial = new THREE.MeshBasicMaterial({ color: 0xef4444 });
        const equator = new THREE.Mesh(equatorGeometry, equatorMaterial); equator.rotation.x = Math.PI / 2; earthGroup.add(equator);

        // 5. 자전축 (흰 선)
        const axisMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
        const axisGeometry = new THREE.BufferGeometry().setFromPoints([ new THREE.Vector3(0, earthRadius + 18, 0), new THREE.Vector3(0, -earthRadius - 18, 0) ]);
        const axisLine = new THREE.Line(axisGeometry, axisMaterial); earthGroup.add(axisLine);

        // 6. 태양 광선 벡터 화살표
        const sunRay = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(0,0,0), R - earthRadius, 0xfef08a, 15, 8);
        scene.add(sunRay);

        // --- UI 컨트롤 및 로직 연동 ---
        const monthSlider = document.getElementById('monthSlider');
        const monthLabel = document.getElementById('monthLabel');
        const infoText = document.getElementById('infoText');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const playText = document.getElementById('playText');
        
        let isPlaying = false; 
        let tiltAngle = 23.5;

        // 재생 버튼 이벤트
        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtn.classList.toggle('playing');
            if (isPlaying) {
                playText.innerText = '일시 정지';
                playIcon.setAttribute('data-lucide', 'pause');
            } else {
                playText.innerText = '자동 재생';
                playIcon.setAttribute('data-lucide', 'play');
            }
            lucide.createIcons();
        });

        // 슬라이더 이벤트
        monthSlider.addEventListener('input', updateSimulation);
        
        // 라디오 토글 이벤트
        document.getElementsByName('tilt').forEach(radio => {
            radio.addEventListener('change', (e) => { tiltAngle = parseFloat(e.target.value); updateSimulation(); });
        });

        // 윈도우 리사이즈 처리 (대시보드 영역 기준)
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });

        // 시뮬레이션 핵심 로직
        function updateSimulation() {
            let currentMonth = parseFloat(monthSlider.value);
            let displayMonth = Math.floor(currentMonth); if(displayMonth > 12) displayMonth = 1;
            monthLabel.innerText = displayMonth + '월';
            
            // 공전 궤도 위치 계산
            const theta = Math.PI - ((currentMonth - 6) * Math.PI / 6);
            const ex = R * Math.cos(theta); const ez = R * Math.sin(theta);
            
            earthGroup.position.set(ex, 0, ez);
            sunRay.setDirection(new THREE.Vector3(ex, 0, ez).normalize());
            earthGroup.rotation.z = -tiltAngle * Math.PI / 180; 

            // 상태별 정보 텍스트 분기
            let text = "";
            if (tiltAngle === 0) {
                text = `<strong>[자전축 0° 수직 상태]</strong><br>지구가 기울어지지 않은 채 꼿꼿하게 공전합니다. 태양의 직사광선이 1년 내내 <strong>적도선(빨간 링)</strong>에만 수직으로 떨어지므로, 위치에 상관없이 <strong>계절의 변화가 발생하지 않습니다.</strong>`;
            } else {
                if (displayMonth >= 5 && displayMonth <= 7) {
                    text = `<strong>[${displayMonth}월: 북반구 여름 / 남반구 겨울]</strong><br>지구의 북반구가 태양을 향해 기울어져 있습니다. 태양 직사광선이 북반구(북회귀선 부근)를 강하게 비추어 북반구는 <strong>여름</strong>이 됩니다.`;
                }
                else if (displayMonth >= 11 || displayMonth === 1) {
                    text = `<strong>[${displayMonth}월: 북반구 겨울 / 남반구 여름]</strong><br>지구의 북반구가 태양을 등지고 기울어져 있습니다. 태양 직사광선이 남반구(남회귀선 부근)를 비추어 북반구는 <strong>겨울</strong>이 됩니다.`;
                }
                else if (displayMonth >= 2 && displayMonth <= 4) {
                    text = `<strong>[${displayMonth}월: 춘분 부근]</strong><br>지구가 태양의 옆면을 지나가고 있습니다. 태양 직사광선이 정확히 <strong>적도 부근</strong>을 비추며, 낮과 밤의 길이가 거의 같아집니다.`;
                }
                else {
                    text = `<strong>[${displayMonth}월: 추분 부근]</strong><br>지구가 태양의 반대쪽 옆면을 지나가고 있습니다. 다시 한번 태양 직사광선이 <strong>적도 부근</strong>을 비춥니다.`;
                }
            }
            infoText.innerHTML = text;
        }

        // 애니메이션 루프
        function animate() {
            requestAnimationFrame(animate);
            if (isPlaying) {
                let currentMonth = parseFloat(monthSlider.value);
                currentMonth += 0.015; if (currentMonth >= 13) currentMonth = 1; 
                monthSlider.value = currentMonth; updateSimulation();
            }
            // 자전 효과
            earth.rotation.y += 0.05;
            
            // 별가루(우주) 천천히 회전
            starField.rotation.y += 0.0005;

            controls.update(); 
            renderer.render(scene, camera);
        }
        
        // 최초 1회 실행
        updateSimulation(); 
        animate();
    </script>
</body>
</html>
