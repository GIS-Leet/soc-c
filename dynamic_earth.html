<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다이내믹 어스: 지형 형성 작용 - 통합사회 C</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/objects/Sky.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>

    <style>
        :root {
            --primary: #2563eb; --primary-light: #eff6ff; --text-main: #0f172a; --text-sub: #64748b;
            --bg-color: #f8fafc; --card-bg: #ffffff; --border-color: rgba(0,0,0,0.06); --radius: 20px;
        }

        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        a { text-decoration: none; color: inherit; }

        .navbar { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; border-bottom: 1px solid var(--border-color); flex-shrink: 0; z-index: 1000;}
        .logo { font-size: 1.25rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .logo-icon { background: var(--primary); color: white; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .menu { display: flex; gap: 24px; }
        .menu a { font-size: 0.95rem; font-weight: 600; color: var(--text-sub); padding: 8px 12px; border-radius: 12px; transition: 0.2s; }
        .menu a:hover, .menu a.active { background: var(--primary-light); color: var(--primary); }

        .dashboard-container { display: flex; flex: 1; padding: 20px; gap: 20px; max-width: 1800px; margin: 0 auto; width: 100%; box-sizing: border-box; overflow: hidden; }
        
        .canvas-wrapper { flex: 2; border-radius: var(--radius); position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border-color); background: #000; }
        #webgl-container { width: 100%; height: 100%; outline: none; }
        .guide-badge { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px); color: white; font-size: 0.85rem; padding: 8px 14px; border-radius: 12px; pointer-events: none; display: flex; align-items: center; gap: 6px; font-weight: 500; z-index: 10;}

        /* 시네마틱 모드 오버레이 (화면 자막) */
        .cinematic-overlay { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; pointer-events: none; z-index: 20; opacity: 0; transition: opacity 0.5s; }
        .cinematic-text { display: inline-block; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); color: white; padding: 15px 30px; border-radius: 16px; font-size: 1.1rem; line-height: 1.6; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .cinematic-title { font-weight: 800; color: #fbbf24; font-size: 1.3rem; margin-bottom: 5px; display: block; }

        .controls-wrapper { flex: 1; min-width: 380px; max-width: 450px; background: var(--card-bg); border-radius: var(--radius); padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .controls-wrapper::-webkit-scrollbar { width: 8px; }
        .controls-wrapper::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .panel-header h2 { margin: 0 0 5px 0; font-size: 1.3rem; font-weight: 800; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
        .panel-header p { margin: 0; font-size: 0.9rem; color: var(--text-sub); line-height: 1.4; }

        .control-group { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 15px; position: relative; }
        .control-group h3 { margin: 0; font-size: 1.05rem; font-weight: 800; color: var(--text-main); display: flex; align-items: center; gap: 6px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px; }
        
        /* 시네마틱 액션 버튼 */
        .action-btn { background: white; border: 1px solid #cbd5e1; padding: 15px; border-radius: 12px; cursor: pointer; font-size: 0.95rem; font-weight: 700; color: var(--text-main); transition: 0.2s; display: flex; justify-content: space-between; align-items: center; font-family: inherit; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .action-btn:hover { background: #f1f5f9; border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(37,99,235,0.1); }
        .action-btn .btn-icon { background: var(--primary-light); color: var(--primary); width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .action-btn .play-icon { color: var(--text-sub); transition: 0.2s; }
        .action-btn:hover .play-icon { color: var(--primary); }
        .action-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        /* 모드 탭 (향후 업데이트용) */
        .tab-container { display: flex; background: #e2e8f0; padding: 4px; border-radius: 12px; margin-bottom: 10px;}
        .tab-btn { flex: 1; text-align: center; padding: 10px 0; font-size: 0.9rem; font-weight: 700; color: var(--text-sub); cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        @media (max-width: 900px) {
            .dashboard-container { flex-direction: column; overflow-y: auto; }
            .canvas-wrapper { min-height: 50vh; flex: none; }
            .controls-wrapper { max-width: 100%; flex: none; }
            .cinematic-text { font-size: 0.9rem; padding: 10px 20px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-icon"><i data-lucide="globe"></i></div>
            Society - C - Geography
        </a>
        <div class="menu">
            <a href="index.html">홈</a>
            <a href="qna.html">Q&A 게시판</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="canvas-wrapper">
            <div class="guide-badge"><i data-lucide="mouse-pointer-2" style="width:14px;height:14px;"></i> 마우스 우클릭으로 시점을 회전할 수 있습니다.</div>
            
            <div class="cinematic-overlay" id="cinematicOverlay">
                <div class="cinematic-text">
                    <span class="cinematic-title" id="cineTitle">제목</span>
                    <span id="cineDesc">설명</span>
                </div>
            </div>

            <div id="webgl-container"></div>
        </div>

        <div class="controls-wrapper">
            <div class="panel-header">
                <h2><i data-lucide="activity" style="color:var(--primary);"></i> 다이내믹 어스</h2>
                <p>지구 내부의 거대한 에너지가 만들어내는 지형 변화를 시네마틱 모드로 관찰합니다.</p>
            </div>

            <div class="tab-container">
                <div class="tab-btn active">1. 내적 작용</div>
                <div class="tab-btn" style="opacity: 0.5; cursor: default;">2. 외적 작용 (준비중)</div>
            </div>

            <div class="control-group">
                <h3><i data-lucide="layers" style="width:18px;"></i> 판구조론 (Plate Tectonics)</h3>
                
                <button class="action-btn" onclick="playScenario('convergent')">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="btn-icon"><i data-lucide="fold-horizontal"></i></div>
                        <div style="text-align:left;">
                            <div style="font-size:0.95rem;">수렴형 경계 (습곡 산맥)</div>
                            <div style="font-size:0.8rem; color:var(--text-sub); font-weight:500;">두 판이 충돌하여 솟아오릅니다. (예: 히말라야)</div>
                        </div>
                    </div>
                    <i data-lucide="play-circle" class="play-icon"></i>
                </button>

                <button class="action-btn" onclick="playScenario('divergent')">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="btn-icon"><i data-lucide="split-square-horizontal"></i></div>
                        <div style="text-align:left;">
                            <div style="font-size:0.95rem;">발산형 경계 (해령)</div>
                            <div style="font-size:0.8rem; color:var(--text-sub); font-weight:500;">두 판이 멀어지며 마그마가 솟습니다. (예: 대서양 중앙 해령)</div>
                        </div>
                    </div>
                    <i data-lucide="play-circle" class="play-icon"></i>
                </button>
            </div>

            <div class="control-group">
                <h3><i data-lucide="flame" style="width:18px;"></i> 화산 활동 (Volcanism)</h3>
                
                <button class="action-btn" onclick="playScenario('volcano')">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="btn-icon" style="background:#fef2f2; color:#dc2626;"><i data-lucide="mountain-snow"></i></div>
                        <div style="text-align:left;">
                            <div style="font-size:0.95rem;">화산 폭발 및 용암 분출</div>
                            <div style="font-size:0.8rem; color:var(--text-sub); font-weight:500;">지하의 마그마가 지표를 뚫고 나옵니다.</div>
                        </div>
                    </div>
                    <i data-lucide="play-circle" class="play-icon"></i>
                </button>
            </div>

            <button class="action-btn" style="justify-content:center; background:#f1f5f9; border-color:transparent; color:var(--text-sub);" onclick="resetScene()">
                <i data-lucide="rotate-ccw" style="width:18px;"></i> 지형 초기화
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // ----------------------------------------------------
        // ★ Three.js 엔진 세팅 (지각 단면도 시점) ★
        // ----------------------------------------------------
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a); // 깊은 지하 배경색
        
        // 카메라: 지형의 '단면'을 잘 볼 수 있도록 세팅
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 2000);
        camera.position.set(0, 100, 350); 
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2; // 지평선 아래로 내려가지 않게

        // 조명
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(100, 200, 100);
        dirLight.castShadow = true;
        scene.add(dirLight);
        scene.add(new THREE.AmbientLight(0x404040, 0.8));

        // 마그마(맨틀) 광원 (아래에서 붉게 쏘아올림)
        const magmaLight = new THREE.PointLight(0xff3300, 0, 300);
        magmaLight.position.set(0, -50, 0);
        scene.add(magmaLight);

        // ----------------------------------------------------
        // ★ 판(Plates)과 지형 메쉬 생성 ★
        // ----------------------------------------------------
        const simplex = new SimplexNoise();
        const plateWidth = 150; const plateDepth = 150; const segments = 64;
        
        // 지각 재질
        const crustMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x8B4513, roughness: 0.9, flatShading: true, side: THREE.DoubleSide 
        });

        // 왼쪽 판
        const leftGeo = new THREE.PlaneGeometry(plateWidth, plateDepth, segments, segments);
        leftGeo.rotateX(-Math.PI / 2);
        const leftPlate = new THREE.Mesh(leftGeo, crustMaterial);
        leftPlate.position.set(-plateWidth/2 - 2, 0, 0); // 가운데 약간의 틈(2)
        scene.add(leftPlate);

        // 오른쪽 판
        const rightGeo = new THREE.PlaneGeometry(plateWidth, plateDepth, segments, segments);
        rightGeo.rotateX(-Math.PI / 2);
        const rightPlate = new THREE.Mesh(rightGeo, crustMaterial);
        rightPlate.position.set(plateWidth/2 + 2, 0, 0);
        scene.add(rightPlate);

        // 기본 노이즈 지형 입히기
        function applyNoise(geometry, offset) {
            const pos = geometry.attributes.position;
            for(let i=0; i<pos.count; i++) {
                const x = pos.getX(i) + offset; const z = pos.getZ(i);
                let y = simplex.noise2D(x/40, z/40) * 8;
                if(y < 0) y = 0;
                pos.setY(i, y);
            }
            pos.needsUpdate = true; geometry.computeVertexNormals();
        }
        applyNoise(leftGeo, -plateWidth/2);
        applyNoise(rightGeo, plateWidth/2);

        // 하단 마그마 바다 (맨틀)
        const magmaGeo = new THREE.PlaneGeometry(400, 400);
        magmaGeo.rotateX(-Math.PI / 2);
        const magmaMat = new THREE.MeshBasicMaterial({ color: 0xff3300, transparent: true, opacity: 0 });
        const magma = new THREE.Mesh(magmaGeo, magmaMat);
        magma.position.y = -10;
        scene.add(magma);

        // ----------------------------------------------------
        // ★ 시네마틱 애니메이션 시스템 ★
        // ----------------------------------------------------
        let currentAnimation = null;
        let animProgress = 0;
        const overlay = document.getElementById('cinematicOverlay');
        const cineTitle = document.getElementById('cineTitle');
        const cineDesc = document.getElementById('cineDesc');

        function showSubtitle(title, desc) {
            cineTitle.innerText = title; cineDesc.innerHTML = desc;
            overlay.style.opacity = 1;
        }
        function hideSubtitle() { overlay.style.opacity = 0; }

        function resetScene() {
            currentAnimation = null; animProgress = 0;
            leftPlate.position.set(-plateWidth/2 - 2, 0, 0);
            rightPlate.position.set(plateWidth/2 + 2, 0, 0);
            magmaMat.opacity = 0; magmaLight.intensity = 0;
            applyNoise(leftGeo, -plateWidth/2); applyNoise(rightGeo, plateWidth/2);
            hideSubtitle();
            camera.position.set(0, 100, 350); controls.target.set(0,0,0);
            document.querySelectorAll('.action-btn').forEach(b => b.disabled = false);
        }

        // 파티클(화산재/용암) 시스템 준비
        const particleGeo = new THREE.BufferGeometry();
        const particleMat = new THREE.PointsMaterial({ color: 0xff5500, size: 3, transparent: true, opacity: 0 });
        const particleCount = 1000;
        const particlesPos = new Float32Array(particleCount * 3);
        const particlesVel = [];
        for(let i=0; i<particleCount; i++) {
            particlesPos[i*3] = 0; particlesPos[i*3+1] = -50; particlesPos[i*3+2] = 0;
            particlesVel.push({
                x: (Math.random() - 0.5) * 2, y: Math.random() * 5 + 2, z: (Math.random() - 0.5) * 2
            });
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlesPos, 3));
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // 시나리오 실행 함수
        function playScenario(type) {
            resetScene();
            document.querySelectorAll('.action-btn').forEach(b => b.disabled = true);
            currentAnimation = type;

            if(type === 'convergent') {
                showSubtitle('수렴형 경계 (대륙판 충돌)', '두 대륙판이 엄청난 압력으로 충돌하며,<br>경계 부근의 지층이 구부러지고 높게 솟아올라 <b>거대한 습곡 산맥</b>을 형성합니다.');
            } else if(type === 'divergent') {
                showSubtitle('발산형 경계 (해령 형성)', '두 판이 양쪽으로 멀어지면서 틈이 생깁니다.<br>이 틈을 뚫고 맨틀 물질(마그마)이 솟아올라 <b>새로운 지각(해령)</b>을 만듭니다.');
            } else if(type === 'volcano') {
                showSubtitle('화산 폭발 (내적 작용)', '지하 깊은 곳의 마그마가 얇아진 지각의 틈을 뚫고 격렬하게 분출합니다.');
                // 카메라 클로즈업
                camera.position.set(0, 80, 200);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if(currentAnimation) {
                animProgress += 0.005;
                if(animProgress > 1) animProgress = 1;

                if(currentAnimation === 'convergent') {
                    // 1. 판이 서서히 다가옴
                    const move = Math.min(animProgress * 10, 2);
                    leftPlate.position.x = -plateWidth/2 - 2 + move;
                    rightPlate.position.x = plateWidth/2 + 2 - move;

                    // 2. 경계면(가운데)이 솟아오름 (습곡산맥 형성)
                    if(animProgress > 0.2) {
                        const uplift = (animProgress - 0.2) * 50; // 과학적 과장 적용
                        const leftPos = leftGeo.attributes.position;
                        for(let i=0; i<leftPos.count; i++) {
                            const x = leftPos.getX(i);
                            if(x > plateWidth/2 - 30) { // 경계 근처 30만큼만 융기
                                const factor = (x - (plateWidth/2 - 30)) / 30; // 0~1
                                leftPos.setY(i, leftPos.getY(i) + factor * uplift * 0.05); // 서서히 올라감
                            }
                        }
                        leftPos.needsUpdate = true; leftGeo.computeVertexNormals();

                        const rightPos = rightGeo.attributes.position;
                        for(let i=0; i<rightPos.count; i++) {
                            const x = rightPos.getX(i);
                            if(x < -plateWidth/2 + 30) { 
                                const factor = (-(plateWidth/2) + 30 - x) / 30; 
                                rightPos.setY(i, rightPos.getY(i) + factor * uplift * 0.05); 
                            }
                        }
                        rightPos.needsUpdate = true; rightGeo.computeVertexNormals();
                        
                        // 지진 효과 (카메라 흔들림)
                        if(animProgress < 0.8 && Math.random() > 0.7) {
                            camera.position.x += (Math.random() - 0.5) * 2;
                        }
                    }
                } 
                else if(currentAnimation === 'divergent') {
                    // 1. 판이 벌어짐
                    const move = animProgress * 30;
                    leftPlate.position.x = -plateWidth/2 - 2 - move;
                    rightPlate.position.x = plateWidth/2 + 2 + move;

                    // 2. 지하 마그마 노출 및 융기
                    magmaMat.opacity = animProgress;
                    magmaLight.intensity = animProgress * 2;
                }
                else if(currentAnimation === 'volcano') {
                    // 가운데 마그마 폭발 파티클 애니메이션
                    magmaLight.intensity = 3;
                    particleMat.opacity = 1;
                    const positions = particleGeo.attributes.position.array;
                    
                    for(let i=0; i<particleCount; i++) {
                        positions[i*3] += particlesVel[i].x; // x
                        positions[i*3+1] += particlesVel[i].y; // y
                        positions[i*3+2] += particlesVel[i].z; // z
                        particlesVel[i].y -= 0.1; // 중력
                        
                        // 바닥에 닿으면 다시 분화구로
                        if(positions[i*3+1] < 0) {
                            positions[i*3] = (Math.random() - 0.5) * 10;
                            positions[i*3+1] = 0;
                            positions[i*3+2] = (Math.random() - 0.5) * 10;
                            particlesVel[i].y = Math.random() * 5 + 3;
                        }
                    }
                    particleGeo.attributes.position.needsUpdate = true;
                    if(Math.random() > 0.5) camera.position.y += (Math.random() - 0.5) * 1; // 화산 폭발 진동
                }
                
                // 애니메이션 종료 처리
                if(animProgress === 1 && currentAnimation !== 'volcano') {
                    setTimeout(() => { document.querySelectorAll('.action-btn').forEach(b => b.disabled = false); }, 1000);
                }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix(); renderer.setSize(container.clientWidth, container.clientHeight);
        });

        animate();
    </script>
</body>
</html>
